apiVersion: apps/v1
kind: Deployment
metadata:
  name: authorization-service
  labels:
    app: authorization-service
spec:
  replicas: 2 # Matched to your HPA minimum
  selector:
    matchLabels:
      app: authorization-service
  template:
    metadata:
      labels:
        app: authorization-service
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: authorization-service
      containers:
      - name: auth-engine
        image: tricko98/auth-service:v5
        imagePullPolicy: IfNotPresent
        env:
        - name: THREADS
          value: "100"
        - name: DB_CONNS
          value: "100"
        - name: KAFKA_BROKERS
          value: "my-kafka:9092"
        - name: DB_CONN
          value: "postgresql://postgres:adminpassword@pgbouncer-service:5432/postgres"
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "1Gi"
            cpu: "2000m"
