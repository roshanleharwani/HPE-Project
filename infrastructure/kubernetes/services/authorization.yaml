apiVersion: apps/v1
kind: Deployment
metadata:
  name: authorization-service
  labels:
    app: authorization-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authorization-service
  template:
    metadata:
      labels:
        app: authorization-service
    spec:
      containers:
      - name: auth-engine
        image: tricko98/auth-service:v2
        imagePullPolicy: Always
        env:
        - name: KAFKA_BROKERS
          value: "my-kafka-controller-0.my-kafka-controller-headless.default.svc.cluster.local:9092"
        - name: DB_CONN
          value: "postgresql://postgres:adminpassword@postgres-postgresql:5432/postgres"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"