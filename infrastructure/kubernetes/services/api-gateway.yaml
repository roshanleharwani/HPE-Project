apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      nodeSelector: {}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: api-gateway
      containers:
      - name: api-gateway
        image: tricko98/api-gateway:v18
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
          value: "my-kafka:9092"
        - name: SPRING_DATA_REDIS_HOST
          value: "redis-master"
        # 2. Use the password you just extracted
        - name: SPRING_DATA_REDIS_PASSWORD
          value: "redispassword"
        # 3. Ensure it knows the port (default is 6379)
        - name: SPRING_DATA_REDIS_PORT
          value: "6379"
        # PostgreSQL connection
        - name: DB_HOST
          value: "pgbouncer-service"
        - name: DB_NAME
          value: "postgres"
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          value: "adminpassword"
        - name: SPRING_JACKSON_SERIALIZATION_WRITEDATESASTIMESTAMPS
          value: "false"
        resources:
          requests:
            memory: "512Mi"
            cpu: "50m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30080
