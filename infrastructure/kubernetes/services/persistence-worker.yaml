apiVersion: apps/v1
kind: Deployment
metadata:
  name: persistence-worker
  labels:
    app: persistence-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: persistence-worker
  template:
    metadata:
      labels:
        app: persistence-worker
    spec:
      containers:
      - name: persistence-worker
        image: tricko98/persistence-worker:v2
        imagePullPolicy: Always
        env:
        - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
          value: "my-kafka-controller-0.my-kafka-controller-headless.default.svc.cluster.local:9092"
        # ── Shard 0 (existing PostgreSQL) ──
        - name: SHARD0_DATASOURCE_URL
          value: "jdbc:postgresql://postgres-postgresql:5432/postgres"
        - name: SHARD0_DATASOURCE_USERNAME
          value: "postgres"
        - name: SHARD0_DATASOURCE_PASSWORD
          value: "adminpassword"
        # ── Shard 1 ──
        - name: SHARD1_DATASOURCE_URL
          value: "jdbc:postgresql://postgres-shard-1:5432/postgres"
        - name: SHARD1_DATASOURCE_USERNAME
          value: "postgres"
        - name: SHARD1_DATASOURCE_PASSWORD
          value: "adminpassword"
        # ── Shard 2 ──
        - name: SHARD2_DATASOURCE_URL
          value: "jdbc:postgresql://postgres-shard-2:5432/postgres"
        - name: SHARD2_DATASOURCE_USERNAME
          value: "postgres"
        - name: SHARD2_DATASOURCE_PASSWORD
          value: "adminpassword"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
