apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
data:
  application.yml: |
    server:
      port: 8080
      tomcat:
        max-connections: 10000
        accept-count: 200 # Load shedding: reject connection if backlog exceeds 200
        threads:
          max: 800
          min-spare: 100
        connection-timeout: 2000ms # Fast fail instead of hanging
    
    spring:
      threads:
        virtual:
          enabled: true
      jackson:
        serialization:
          write-dates-as-timestamps: false
      application:
        name: api-gateway
      datasource:
        # IMPORTANT: Ensure ${DB_HOST} is passed as 'pgbouncer-service' in your deployment.yaml!
        url: jdbc:postgresql://${DB_HOST:postgres-postgresql}:5432/${DB_NAME:postgres}
        username: ${DB_USER:postgres}
        password: ${DB_PASSWORD:adminpassword}
        driver-class-name: org.postgresql.Driver
        hikari:
          maximum-pool-size: 20  # Reduced to prevent DB explosion at 80 pods
          connection-timeout: 20000
          max-lifetime: 600000
          keepalive-time: 300000
      jpa:
        hibernate:
          ddl-auto: none
        show-sql: false
        properties:
          hibernate:
            dialect: org.hibernate.dialect.PostgreSQLDialect
      data:
        redis:
          # Fixed for Kubernetes internal DNS
          host: ${REDIS_HOST:redis-master} 
          port: 6379
          lettuce:
            pool:
              max-active: 32
              max-idle: 16
              min-idle: 8
      kafka:
        # Fixed for Kubernetes internal DNS
        bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:my-kafka:9092}
        producer:
          key-serializer: org.apache.kafka.common.serialization.StringSerializer
          value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
          retries: 3
          batch-size: 65536
          buffer-memory: 67108864
          properties:
            spring.json.add.type.headers: false
            linger.ms: 10
            acks: "1"
            compression.type: lz4
            request.timeout.ms: 2000
            delivery.timeout.ms: 3000
            max.block.ms: 2000
    
    logging:
      level:
        root: WARN
        com.payments.gateway: INFO
        org.apache.kafka: WARN
    
    payment:
      kafka:
        topic:
          initiated: payment_initiated
