server:
  port: 8080
  tomcat:
    max-connections: 10000
    accept-count: 200 # Load shedding: reject connection if backlog exceeds 200
    threads:
      max: 800
      min-spare: 100
  connection-timeout: 2000ms # Fast fail instead of hanging

spring:
  application:
    name: api-gateway
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres-postgresql}:5432/${DB_NAME:postgres}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:adminpassword}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 100
      connection-timeout: 2000
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      retries: 3
      batch-size: 32768
      buffer-memory: 33554432
      properties:
        spring.json.add.type.headers: false
        linger.ms: 10
        request.timeout.ms: 2000
        delivery.timeout.ms: 3000

payment:
  kafka:
    topic:
      initiated: payment_initiated
