server:
  port: 8080
  tomcat:
    max-connections: 10000
    accept-count: 5000 # Increased to prevent Connection Refused errors under bursty load
    threads:
      max: 800
      min-spare: 100
  connection-timeout: 2000ms # Fast fail instead of hanging

spring:
  threads:
    virtual:
      enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
  application:
    name: api-gateway
  datasource:
    # IMPORTANT: Ensure ${DB_HOST} is passed as 'pgbouncer-service' in your deployment.yaml!
    url: jdbc:postgresql://${DB_HOST:postgres-postgresql}:5432/${DB_NAME:postgres}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:adminpassword}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 100  # Increased for massive concurrency
      connection-timeout: 20000
      max-lifetime: 600000
      keepalive-time: 300000
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      # Fixed for Kubernetes internal DNS
      host: ${REDIS_HOST:redis-master} 
      port: 6379
  kafka:
    # Fixed for Kubernetes internal DNS
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:my-kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      retries: 3
      batch-size: 32768
      buffer-memory: 33554432
      properties:
        spring.json.add.type.headers: false
        linger.ms: 2
        acks: "1"                  # Added for throughput
        compression.type: lz4      # Added to save network bandwidth
        request.timeout.ms: 2000
        delivery.timeout.ms: 3000

payment:
  kafka:
    topic:
      initiated: payment_initiated