name: Build, Push, and Deploy

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api-gateway
            path: services/api-gateway
          - name: authorization-service
            path: services/authorization-service
          - name: clearing-service
            path: services/clearing-service
          - name: reporting-service
            path: services/reporting-service
          - name: settlement-service
            path: services/settlement-service
          - name: persistence-worker
            path: workers/persistence-worker
            
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.path }}
          file: ./${{ matrix.path }}/Dockerfile
          push: true
          # This tags the image with 'latest' and the git commit SHA.
          # You can also use your Docker Hub username here dynamically, or hardcode it (like tricko98).
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.name }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.name }}:${{ github.sha }}

  deploy:
    name: Deploy to Master Node
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Navigate to your project directory
            cd ~/HPE-Project || exit
            
            # Pull any configuration changes
            git pull origin main
            
            # Apply Kubernetes manifests
            kubectl apply -f infrastructure/kubernetes/services/
            
            # Restart the deployments to force them to pull the latest image 
            # (since imagePullPolicy is Always and we just pushed a new 'latest' image)
            kubectl rollout restart deployment api-gateway
            kubectl rollout restart deployment authorization-service
            kubectl rollout restart deployment clearing-service
            kubectl rollout restart deployment settlement-service
            kubectl rollout restart deployment persistence-worker
            
            echo "Deployment successfully rolled out!"
